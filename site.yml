# site.yml - Master Playbook
# This is what you run: ansible-playbook site.yml
---
- name: Enterprise Server Patching Workflow
  hosts: webservers
  gather_facts: yes
  serial: 1 # Perform rolling updates to maintain application availability

  roles:
    - role: pre_checks
      tags: pre_check
    - role: patching
      tags: patch
    - role: post_checks
      tags: post_check

  post_tasks:
    - name: Workflow completed
      ansible.builtin.debug:
        msg: "Patching cycle completed successfully for {{ inventory_hostname }}"