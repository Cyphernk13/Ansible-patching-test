# roles/patching/tasks/main.yml
# The actual patching tasks
---
- name: Include OS-specific patching tasks
  ansible.builtin.include_tasks: "{{ ansible_os_family | lower }}.yml"

- name: Reboot server if required
  ansible.builtin.reboot:
    reboot_timeout: "{{ reboot_timeout }}"
    pre_reboot_delay: 5
    post_reboot_delay: 30
    test_command: whoami
  when: patch_reboot_required | default(false)

- name: Record patching end time
  ansible.builtin.set_fact:
    patch_end_time: "{{ ansible_date_time.iso8601 }}"
