# roles/patching/tasks/main.yml
# The actual patching tasks
---

# ============================================================
# TASK 1: Update package cache (refresh package list)
# ============================================================
- name: Update DNF package cache
  dnf:
    update_cache: yes          # Refresh list of available updates
  tags: patching

# ============================================================
# TASK 2: Apply security patches only (safer option)
# ============================================================
- name: Apply SECURITY patches only
  dnf:
    name: '*'                  # Apply to all packages
    state: latest
    security: yes             # ONLY security updates (not all updates)
  register: security_patch_result
  tags: patching, security

# ============================================================
# TASK 3: Apply ALL patches (use this for full patching)
# Comment out Task 2 and use this for complete updates
# ============================================================
# - name: Apply ALL available patches
#   dnf:
#     name: '*'
#     state: latest
#   register: full_patch_result
#   tags: patching

# ============================================================
# TASK 4: Check if reboot is required
# ============================================================
- name: Check if reboot is required after patching
  stat:                        # Check if this file exists
    path: /var/run/reboot-required
  register: reboot_required_file
  tags: patching

# Amazon Linux check (different from Ubuntu)
- name: Check kernel update (Amazon Linux)
  shell: needs-restarting -r
  register: kernel_reboot_needed
  failed_when: false           # Don't fail if command returns non-zero
  changed_when: false
  tags: patching

# ============================================================
# TASK 5: Reboot if needed (and wait for server to come back)
# ============================================================
- name: Reboot server if required
  reboot:
    reboot_timeout: "{{ reboot_timeout }}"   # Wait up to 5 minutes
    pre_reboot_delay: 5        # Wait 5 seconds before rebooting
    post_reboot_delay: 30      # Wait 30 seconds after server boots
    test_command: whoami       # Run this to confirm server is back
  when: >                      # Reboot ONLY IF:
    kernel_reboot_needed.rc == 1 or
    reboot_required_file.stat.exists
  tags: patching, reboot

# ============================================================
# TASK 6: Clean up old packages after patching
# ============================================================
- name: Remove old/unused packages (cleanup)
  dnf:
    autoremove: yes
  tags: patching, cleanup

# ============================================================
# TASK 7: Record patching completion time
# ============================================================
- name: Record patching end time
  set_fact:
    patch_end_time: "{{ ansible_date_time.iso8601 }}"
  tags: patching
