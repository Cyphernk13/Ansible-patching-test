# roles/post_checks/tasks/main.yml
# Post-patching verification - runs AFTER updates are applied
---

# ============================================================
# TASK 1: Wait for server to be fully ready
# ============================================================
- name: Wait for server to be fully operational
  wait_for_connection:
    timeout: 300              # Wait up to 5 minutes
  tags: post_check

# ============================================================
# TASK 2: Gather fresh facts after patching
# ============================================================
- name: Gather fresh system facts after patching
  setup:
    gather_subset:
      - min
  tags: post_check

# ============================================================
# TASK 3: Check new kernel version
# ============================================================
- name: Display new kernel version
  debug:
    msg: "New kernel running: {{ ansible_kernel }}"
  tags: post_check

# ============================================================
# TASK 4: Verify ALL critical services are running
# ============================================================
- name: Refresh service facts
  service_facts:
  tags: post_check

- name: Verify critical services are running
  assert:                     # assert = 'make sure this is true or FAIL'
    that:
      - "ansible_facts.services[item + '.service'].state == 'running'"
    fail_msg: "CRITICAL: {{ item }} is NOT running after patching!"
    success_msg: "OK: {{ item }} is running"
  loop: "{{ critical_services }}"
  when: item + '.service' in ansible_facts.services
  tags: post_check

# ============================================================
# TASK 5: Check disk space after patching
# ============================================================
- name: Check disk space after patching
  shell: df -h / | tail -1 | awk '{print $5}' | sed 's/%//'
  register: disk_after
  changed_when: false
  tags: post_check

# ============================================================
# TASK 6: Get new package list and compare with before
# ============================================================
- name: Get package list after patching
  shell: rpm -qa --queryformat '%{NAME}-%{VERSION}\n' | sort
  register: packages_after
  changed_when: false
  tags: post_check

- name: Save new package list
  copy:
    content: "{{ packages_after.stdout }}"
    dest: /tmp/packages_after_patch.txt
  tags: post_check

# ============================================================
# TASK 7: Show packages that were updated
# ============================================================
- name: Show what packages changed
  shell: diff /tmp/packages_before_patch.txt /tmp/packages_after_patch.txt || true
  register: package_diff
  changed_when: false
  tags: post_check

- name: Display changed packages
  debug:
    msg: |
      PACKAGES CHANGED:
      {{ package_diff.stdout }}
  tags: post_check

# ============================================================
# TASK 8: Final health check - ping the server
# ============================================================
- name: Final connectivity check
  ping:
  tags: post_check

# ============================================================
# TASK 9: Generate final patching report
# ============================================================
- name: Generate post-patching summary
  debug:
    msg: |
      ============================================
      PATCHING COMPLETE - SUMMARY REPORT
      ============================================
      Server:        {{ ansible_hostname }}
      OS:            {{ ansible_distribution }} {{ ansible_distribution_version }}
      Kernel:        {{ ansible_kernel }}
      Patch Start:   {{ patch_start_time }}
      Patch End:     {{ patch_end_time }}
      Disk Usage:    {{ disk_after.stdout }}%
      Status:        SUCCESS ✓
      ============================================
  tags: post_check
