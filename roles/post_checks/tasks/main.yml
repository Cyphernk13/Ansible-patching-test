# roles/post_checks/tasks/main.yml
# Post-patching verification - runs AFTER updates are applied
---
- name: Wait for connection to ensure server is operational
  ansible.builtin.wait_for_connection:
    timeout: 300

- name: Gather fresh facts
  ansible.builtin.setup:

- name: Refresh service facts
  ansible.builtin.service_facts:

- name: Verify critical services are running
  ansible.builtin.assert:
    that:
      - ansible_facts.services[item + '.service'].state == 'running'
    fail_msg: "CRITICAL: {{ item }} failed to start after patching."
  loop: "{{ critical_services }}"
  when: item + '.service' in ansible_facts.services

- name: Collect newly installed packages (RedHat family)
  ansible.builtin.shell: rpm -qa --queryformat '%{NAME}-%{VERSION}\n' | sort
  register: pkg_after_rhel
  changed_when: false
  when: ansible_os_family == "RedHat"

- name: Collect newly installed packages (Debian family)
  ansible.builtin.shell: dpkg-query -f '${binary:Package}-${Version}\n' -W | sort
  register: pkg_after_deb
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Save final package list
  ansible.builtin.copy:
    content: "{{ pkg_after_rhel.stdout if ansible_os_family == 'RedHat' else pkg_after_deb.stdout }}"
    dest: /tmp/packages_after_patch.txt
    mode: '0644'

- name: Determine changed packages
  ansible.builtin.command: diff /tmp/packages_before_patch.txt /tmp/packages_after_patch.txt
  register: package_diff
  failed_when: false
  changed_when: package_diff.rc != 0

- name: Print executive patching summary
  ansible.builtin.debug:
    msg: |
      --- PATCHING SUMMARY ---
      Hostname:      {{ inventory_hostname }}
      OS:            {{ ansible_distribution }} {{ ansible_distribution_version }}
      Active Kernel: {{ ansible_kernel }}
      Duration:      {{ patch_start_time }} to {{ patch_end_time }}
      Rebooted:      {{ patch_reboot_required | default(false) }}
      Updates:       {{ 'Changes detected' if package_diff.rc != 0 else 'No packages required updates' }}