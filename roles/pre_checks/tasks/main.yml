# roles/pre_checks/tasks/main.yml
# Pre-patching checks - runs BEFORE any updates are applied
---
- name: Record patching start time
  ansible.builtin.set_fact:
    patch_start_time: "{{ ansible_date_time.iso8601 }}"

- name: Verify minimum free disk space on root (>= 20%)
  ansible.builtin.assert:
    that:
      - (item.size_available / item.size_total) > 0.20
    fail_msg: "CRITICAL: Disk space on {{ item.mount }} is below 20%."
  loop: "{{ ansible_mounts }}"
  when: item.mount == '/'

- name: Collect currently installed packages (RedHat family)
  ansible.builtin.shell: rpm -qa --queryformat '%{NAME}-%{VERSION}\n' | sort
  register: pkg_before_rhel
  changed_when: false
  when: ansible_os_family == "RedHat"

- name: Collect currently installed packages (Debian family)
  ansible.builtin.shell: dpkg-query -f '${binary:Package}-${Version}\n' -W | sort
  register: pkg_before_deb
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Save initial package list
  ansible.builtin.copy:
    content: "{{ pkg_before_rhel.stdout if ansible_os_family == 'RedHat' else pkg_before_deb.stdout }}"
    dest: /tmp/packages_before_patch.txt
    mode: '0644'

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Verify critical services are running before patching
  ansible.builtin.assert:
    that:
      - ansible_facts.services[item + '.service'].state == 'running'
    fail_msg: "CRITICAL: Pre-check failed. {{ item }} is not running."
  loop: "{{ critical_services }}"
  when: item + '.service' in ansible_facts.services
